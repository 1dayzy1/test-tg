<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Форма ввода данных</h1>
        
        <div class="form-group">
            <label for="input1" class="label">Первое поле:</label>
            <input type="text" id="input1" class="input" placeholder="Введите данные 1">
        </div>
        
        <div class="form-group">
            <label for="input2" class="label">Второе поле:</label>
            <input type="text" id="input2" class="input" placeholder="Введите данные 2">
        </div>
        
        <button id="submitBtn"  class="submit-btn">Отправить данные</button>
        <div id="result" class="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
